<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — LOR Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-wrapper">
  <div id="sidebar-placeholder"></div>

  <div class="main-content">
    <div id="navbar-placeholder"></div>

    <div class="page-body">
      <div class="page-header">
        <h1>Analytics</h1>
        <p>Institution-wide LOR request statistics and trends.</p>
      </div>

      <!-- Summary Stats -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon blue"><i class="bi bi-collection"></i></div>
            <div class="stat-value" id="aTotal">—</div>
            <div class="stat-label">Total Requests</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon green"><i class="bi bi-check-circle"></i></div>
            <div class="stat-value" id="aApproved">—</div>
            <div class="stat-label">Approved</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon amber"><i class="bi bi-clock"></i></div>
            <div class="stat-value" id="aPending">—</div>
            <div class="stat-label">Pending</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon red"><i class="bi bi-x-circle"></i></div>
            <div class="stat-value" id="aRejected">—</div>
            <div class="stat-label">Rejected</div>
          </div>
        </div>
      </div>

      <!-- Charts Row 1 -->
      <div class="row g-4 mb-4">
        <div class="col-lg-6">
          <div class="card h-100">
            <div class="card-header">Requests by Status</div>
            <div class="card-body d-flex align-items-center justify-content-center" style="min-height:260px;">
              <canvas id="statusChart" style="max-height:240px;"></canvas>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card h-100">
            <div class="card-header">Requests by Purpose</div>
            <div class="card-body d-flex align-items-center justify-content-center" style="min-height:260px;">
              <canvas id="purposeChart" style="max-height:240px;"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Charts Row 2 -->
      <div class="row g-4 mb-4">
        <div class="col-lg-8">
          <div class="card h-100">
            <div class="card-header">Requests by Branch</div>
            <div class="card-body" style="min-height:260px;">
              <canvas id="branchChart"></canvas>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card h-100">
            <div class="card-header">Monthly Comparison</div>
            <div class="card-body" style="min-height:260px;">
              <canvas id="monthlyChart"></canvas>
            </div>
          </div>
        </div>
      </div>

    </div>
    <div id="footer-placeholder"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/student-dashboard.js"></script>
<script>
// Analytics page — inline script since logic is chart-specific
document.addEventListener('DOMContentLoaded', async () => {
  const user = requireAuth();
  if (!user) return;

  await injectComponents('Analytics');

  try {
    const res = await apiCall('/analytics/summary', 'GET');
    if (!res.success) return;

    const s = res.data;

    // Summary stats
    document.getElementById('aTotal').textContent    = s.total;
    document.getElementById('aApproved').textContent = s.approved;
    document.getElementById('aPending').textContent  = s.pending;
    document.getElementById('aRejected').textContent = s.rejected;

    const COLORS = {
      blue:  ['#1a56db','#3b82f6','#93c5fd','#dbeafe'],
      green: '#16a34a', amber: '#d97706', red: '#dc2626', sent: '#7c3aed',
    };

    // Status Doughnut
    new Chart(document.getElementById('statusChart'), {
      type: 'doughnut',
      data: {
        labels: ['Approved', 'Pending', 'Rejected', 'Sent'],
        datasets: [{ data: [s.approved, s.pending, s.rejected, s.sent],
          backgroundColor: [COLORS.green, COLORS.amber, COLORS.red, COLORS.sent],
          borderWidth: 2, borderColor: '#fff',
        }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });

    // Purpose Bar
    const purposeEntries = Object.entries(s.byPurpose);
    new Chart(document.getElementById('purposeChart'), {
      type: 'bar',
      data: {
        labels: purposeEntries.map(([k]) => k),
        datasets: [{ label: 'Requests', data: purposeEntries.map(([,v]) => v),
          backgroundColor: COLORS.blue,
          borderRadius: 6,
        }]
      },
      options: { responsive: true, plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
      }
    });

    // Branch Horizontal Bar
    const branchEntries = Object.entries(s.byBranch);
    new Chart(document.getElementById('branchChart'), {
      type: 'bar',
      data: {
        labels: branchEntries.map(([k]) => k),
        datasets: [{ label: 'Requests', data: branchEntries.map(([,v]) => v),
          backgroundColor: ['#1a56db','#16a34a','#d97706','#dc2626'],
          borderRadius: 6,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true, plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true } }
      }
    });

    // Monthly Comparison
    new Chart(document.getElementById('monthlyChart'), {
      type: 'bar',
      data: {
        labels: ['Last Month', 'This Month'],
        datasets: [{ label: 'Requests', data: [s.lastMonth, s.thisMonth],
          backgroundColor: ['#93c5fd', '#1a56db'], borderRadius: 6,
        }]
      },
      options: { responsive: true, plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
      }
    });

  } catch (err) {
    console.error('Analytics failed:', err);
  }
});
</script>
</body>
</html>
