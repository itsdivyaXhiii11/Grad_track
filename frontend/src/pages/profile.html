<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — LOR Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="sidebar-placeholder"></div>

  <div class="main-content">
    <div id="navbar-placeholder"></div>

    <div class="page-body">
      <div class="page-header">
        <h1>My Profile</h1>
        <p>View and manage your account information.</p>
      </div>

      <div id="profileAlert" class="alert d-none mb-3"></div>

      <!-- Profile Hero Card -->
      <div class="profile-hero mb-4" id="profileHero">
        <div class="profile-avatar" id="profileInitial">?</div>
        <div class="profile-info">
          <h2 id="profileName">Loading…</h2>
          <p id="profileRoleLine">—</p>
          <p id="profileEmailLine" style="opacity:.7; font-size:.85rem;">—</p>
        </div>
        <div class="ms-auto d-none d-md-block">
          <button class="btn btn-sm" style="background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3);"
                  onclick="toggleEditMode()">
            <i class="bi bi-pencil me-1"></i>Edit Profile
          </button>
        </div>
      </div>

      <div class="row g-4">
        <!-- Profile Details -->
        <div class="col-lg-7">
          <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between">
              <span><i class="bi bi-person me-2 text-primary-color"></i>Personal Information</span>
              <button class="btn btn-sm btn-outline-primary d-md-none" onclick="toggleEditMode()">
                <i class="bi bi-pencil me-1"></i>Edit
              </button>
            </div>
            <div class="card-body">
              <!-- View Mode -->
              <div id="viewMode">
                <div class="row g-3">
                  <div class="col-sm-6">
                    <div class="form-label">Full Name</div>
                    <div class="fw-700" id="vName">—</div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-label">Email Address</div>
                    <div id="vEmail">—</div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-label">USN / Employee ID</div>
                    <div id="vUSN">—</div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-label">Branch / Department</div>
                    <div id="vBranch">—</div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-label">Current Semester</div>
                    <div id="vSemester">—</div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-label">Phone Number</div>
                    <div id="vPhone">—</div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-label">Role</div>
                    <div id="vRole">—</div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-label">Member Since</div>
                    <div id="vJoined">—</div>
                  </div>
                </div>
              </div>

              <!-- Edit Mode -->
              <form id="editMode" class="d-none" novalidate>
                <div class="row g-3">
                  <div class="col-sm-6">
                    <label for="eName" class="form-label">Full Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="eName" required />
                  </div>
                  <div class="col-sm-6">
                    <label for="eEmail" class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="eEmail" required />
                  </div>
                  <div class="col-sm-6">
                    <label for="eUSN" class="form-label">USN</label>
                    <input type="text" class="form-control" id="eUSN" readonly
                           style="background:var(--surface-2); cursor:not-allowed;" />
                    <small class="text-muted">USN cannot be changed.</small>
                  </div>
                  <div class="col-sm-6">
                    <label for="eBranch" class="form-label">Branch</label>
                    <select class="form-select" id="eBranch">
                      <option value="">Select</option>
                      <option value="CSE">Computer Science (CSE)</option>
                      <option value="ISE">Information Science (ISE)</option>
                      <option value="ECE">Electronics (ECE)</option>
                      <option value="MECH">Mechanical Engineering</option>
                    </select>
                  </div>
                  <div class="col-sm-6">
                    <label for="eSemester" class="form-label">Semester</label>
                    <select class="form-select" id="eSemester">
                      <option value="">Select</option>
                      <option>5th</option><option>6th</option>
                      <option>7th</option><option>8th</option><option>Alumni</option>
                    </select>
                  </div>
                  <div class="col-sm-6">
                    <label for="ePhone" class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="ePhone" placeholder="+91 9876543210" />
                  </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                  <button type="submit" class="btn btn-primary btn-sm" id="saveProfileBtn">
                    <i class="bi bi-check-lg me-1"></i>Save Changes
                  </button>
                  <button type="button" class="btn btn-outline-secondary btn-sm" onclick="toggleEditMode()">
                    Cancel
                  </button>
                </div>
              </form>

            </div>
          </div>
        </div>

        <!-- Side Panel -->
        <div class="col-lg-5">
          <!-- Change Password -->
          <div class="card mb-4">
            <div class="card-header">
              <i class="bi bi-lock me-2 text-primary-color"></i>Change Password
            </div>
            <div class="card-body">
              <form id="changePasswordForm" novalidate>
                <div class="mb-3">
                  <label for="currentPwd" class="form-label">Current Password</label>
                  <input type="password" class="form-control" id="currentPwd" required />
                </div>
                <div class="mb-3">
                  <label for="newPwd" class="form-label">New Password</label>
                  <input type="password" class="form-control" id="newPwd" required minlength="8" />
                </div>
                <div class="mb-3">
                  <label for="confirmNewPwd" class="form-label">Confirm New Password</label>
                  <input type="password" class="form-control" id="confirmNewPwd" required />
                </div>
                <button type="submit" class="btn btn-primary btn-sm w-100">
                  <i class="bi bi-shield-lock me-1"></i>Update Password
                </button>
              </form>
            </div>
          </div>

          <!-- Account Actions -->
          <div class="card">
            <div class="card-header">
              <i class="bi bi-gear me-2 text-primary-color"></i>Account
            </div>
            <div class="card-body d-grid gap-2">
              <button class="btn btn-outline-primary btn-sm" onclick="window.location.href='lor-requests.html'">
                <i class="bi bi-list-check me-1"></i>View My LOR Requests
              </button>
              <button class="btn btn-outline-secondary btn-sm" onclick="window.location.href='lor-request.html'">
                <i class="bi bi-file-earmark-plus me-1"></i>Submit New LOR Request
              </button>
              <hr class="my-1" />
              <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                <i class="bi bi-box-arrow-right me-1"></i>Sign Out
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
    <div id="footer-placeholder"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/student-dashboard.js"></script>
<script>
// Profile page — inline since it's self-contained
document.addEventListener('DOMContentLoaded', async () => {
  const user = requireAuth();
  if (!user) return;
  await injectComponents('My Profile');
  await loadProfile();
  setupChangePassword();
  setupEditForm();
});

let currentProfile = {};

async function loadProfile() {
  try {
    const res = await apiCall('/user/profile', 'GET');
    if (!res.success) return;
    currentProfile = res.data;
    renderProfile(res.data);
  } catch (err) {
    console.error('Profile load failed:', err);
    // Fallback to session user
    const u = getSessionUser();
    if (u) renderProfile({ name: u.name, email: u.email, usn: u.usn, branch: u.branch, role: u.role });
  }
}

function renderProfile(p) {
  // Hero
  document.getElementById('profileInitial').textContent  = p.name?.[0]?.toUpperCase() || '?';
  document.getElementById('profileName').textContent      = p.name || '—';
  document.getElementById('profileRoleLine').textContent  = capitalize(p.role || '') + (p.branch ? ` · ${p.branch}` : '');
  document.getElementById('profileEmailLine').textContent = p.email || '—';

  // View mode fields
  document.getElementById('vName').textContent     = p.name     || '—';
  document.getElementById('vEmail').textContent    = p.email    || '—';
  document.getElementById('vUSN').textContent      = p.usn      || '—';
  document.getElementById('vBranch').textContent   = p.branch   || '—';
  document.getElementById('vSemester').textContent = p.semester || '—';
  document.getElementById('vPhone').textContent    = p.phone    || '—';
  document.getElementById('vRole').textContent     = capitalize(p.role || '') || '—';
  document.getElementById('vJoined').textContent   = p.joinedAt
    ? new Date(p.joinedAt).toLocaleDateString('en-IN', { day: '2-digit', month: 'long', year: 'numeric' })
    : '—';
}

function toggleEditMode() {
  const viewMode = document.getElementById('viewMode');
  const editMode = document.getElementById('editMode');
  const isEditing = !editMode.classList.contains('d-none');

  if (isEditing) {
    viewMode.classList.remove('d-none');
    editMode.classList.add('d-none');
  } else {
    // Pre-fill edit form
    document.getElementById('eName').value    = currentProfile.name     || '';
    document.getElementById('eEmail').value   = currentProfile.email    || '';
    document.getElementById('eUSN').value     = currentProfile.usn      || '';
    document.getElementById('eBranch').value  = currentProfile.branch   || '';
    document.getElementById('eSemester').value = currentProfile.semester || '';
    document.getElementById('ePhone').value   = currentProfile.phone    || '';

    viewMode.classList.add('d-none');
    editMode.classList.remove('d-none');
  }
}

function setupEditForm() {
  document.getElementById('editMode').addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
      name:     document.getElementById('eName').value.trim(),
      email:    document.getElementById('eEmail').value.trim(),
      branch:   document.getElementById('eBranch').value,
      semester: document.getElementById('eSemester').value,
      phone:    document.getElementById('ePhone').value.trim(),
    };

    try {
      const res = await apiCall('/user/profile', 'PUT', payload);
      if (res.success || true) { // always succeed in mock
        currentProfile = { ...currentProfile, ...payload };
        renderProfile(currentProfile);
        toggleEditMode();
        showAlert('Profile updated successfully!', 'success');
      }
    } catch (err) {
      showAlert('Failed to update profile.', 'danger');
    }
  });
}

function setupChangePassword() {
  document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const newPwd     = document.getElementById('newPwd').value;
    const confirmPwd = document.getElementById('confirmNewPwd').value;
    if (newPwd !== confirmPwd) {
      showAlert('New passwords do not match.', 'danger');
      return;
    }
    try {
      // Mock: always succeeds
      showAlert('Password updated successfully!', 'success');
      document.getElementById('changePasswordForm').reset();
    } catch {
      showAlert('Failed to update password.', 'danger');
    }
  });
}

function showAlert(msg, type) {
  const el = document.getElementById('profileAlert');
  el.textContent = msg;
  el.className = `alert alert-${type}`;
  setTimeout(() => { el.className = 'alert d-none'; }, 3500);
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
</script>
</body>
</html>
