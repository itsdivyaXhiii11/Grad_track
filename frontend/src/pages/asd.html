<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOR Request</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />

  
</head>
<body class="bg-light">
  <div class="container mt-5 mb-5">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">Letter of Recommendation Request</h4>
      </div>
      <div class="card-body">
        <form id="lorRequestForm" enctype="multipart/form-data" novalidate>
          <!-- Faculty 1 -->
          <div class="mb-3">
            <label for="faculty1" class="form-label">Faculty 1</label>
            <select id="faculty1" class="form-select" required>
              <option value="">Select Faculty</option>
            </select>
            <input type="text" id="faculty1Manual" class="form-control mt-2" placeholder="Or enter faculty name manually">
          </div>

          <!-- Faculty 2 -->
          <div class="mb-3">
            <label for="faculty2" class="form-label">Faculty 2</label>
            <select id="faculty2" class="form-select" required>
              <option value="">Select Faculty</option>
            </select>
            <input type="text" id="faculty2Manual" class="form-control mt-2" placeholder="Or enter faculty name manually">
          </div>

          <!-- University Name -->
          <div class="mb-3">
            <label for="university" class="form-label">University Name</label>
            <input type="text" id="university" class="form-control" required>
          </div>

          <!-- Country -->
          <div class="mb-3">
            <label for="country" class="form-label">Country</label>
            <input type="text" id="country" class="form-control" required>
          </div>

          <!-- Course -->
          <div class="mb-3">
            <label for="course" class="form-label">Course</label>
            <input type="text" id="course" class="form-control" required>
          </div>

          <!-- Timeline -->
          <div class="mb-3">
            <label for="timeline" class="form-label">Timeline</label>
            <select id="timeline" class="form-select" required>
              <option value="">Select Timeline</option>
              <option value="15 days">15 days</option>
              <option value="1 month">1 month</option>
              <option value="2 months">2 months</option>
              <option value="3 months">3 months</option>
              <option value="6 months">6 months</option>
            </select>
          </div>

          <!-- File Upload -->
          <div class="mb-3">
            <label for="file" class="form-label">Upload File (PDF, DOC, DOCX only)</label>
            <input type="file" id="file" class="form-control" accept=".pdf,.doc,.docx" required>
          </div>

          <!-- Alert -->
          <div id="alertBox" class="alert d-none" role="alert"></div>

          <!-- Submit Button -->
          <div class="text-end">
            <button type="submit" class="btn btn-primary">Submit Request</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="lor-request.js"></script>
</body>
</html>
