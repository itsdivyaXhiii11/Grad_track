<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — LOR Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-mortarboard-fill"></i></div>
      <div class="logo-text">LOR Portal</div>
    </div>

    <h2>Welcome back</h2>
    <p class="auth-sub">Sign in to continue to your portal</p>

    <!-- Alert box -->
    <div id="loginAlert" class="alert d-none mb-3" role="alert"></div>

    <!-- Login Form -->
    <form id="loginForm" novalidate>

      <div class="mb-3">
        <label for="loginEmail" class="form-label">Email address</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" class="form-control border-start-0 ps-0" id="loginEmail"
                 placeholder="you@college.edu" required autocomplete="email" />
        </div>
        <div class="invalid-feedback">Please enter a valid email.</div>
      </div>

      <div class="mb-3">
        <label for="loginPassword" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" class="form-control border-start-0 ps-0" id="loginPassword"
                 placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="input-group-text bg-white" id="togglePassword">
            <i class="bi bi-eye text-muted"></i>
          </button>
        </div>
        <div class="invalid-feedback">Password is required.</div>
      </div>

      <div class="mb-3">
        <label for="loginRole" class="form-label">Login as</label>
        <select class="form-select" id="loginRole" required>
          <option value="" disabled selected>Select your role</option>
          <option value="student">Student</option>
          <option value="faculty">Faculty</option>
          <option value="admin">Coordinator / Admin</option>
        </select>
        <div class="invalid-feedback">Please select a role.</div>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2" id="loginBtn">
        <span id="loginBtnText"><i class="bi bi-box-arrow-in-right me-1"></i>Sign In</span>
        <span id="loginBtnSpinner" class="d-none">
          <span class="spinner-border spinner-border-sm me-1"></span>Signing in…
        </span>
      </button>
    </form>

    <div class="auth-divider mt-3"><span>New here?</span></div>

    <a href="register.html" class="btn btn-outline-primary w-100">
      <i class="bi bi-person-plus me-1"></i>Create an account
    </a>

    <!-- Demo credentials hint -->
    <div class="mt-3 p-3 rounded" style="background:var(--surface-2); font-size:.78rem; color:var(--text-muted);">
      <strong style="color:var(--text-secondary);">Demo hint:</strong>
      Use any email &amp; password. Select a role to be redirected accordingly.
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
