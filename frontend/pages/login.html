<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GradTrack</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
            --soft-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fc;
            margin: 0;
            overflow-x: hidden;
        }

        .split-screen {
            display: flex;
            flex-wrap: wrap;
            height: 100vh;
        }

        /* Left Side - Visual Section */
        .visual-section {
            background: var(--primary-gradient);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .visual-section h1 {
            font-weight: 700;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .visual-section p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 400px;
        }

        /* Right Side - Form Section */
        .form-section {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
        }

        .form-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .form-card h2 {
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .input-group-text {
            background-color: #f8f9fc;
            border-right: none;
            color: #4e73df;
        }

        .form-control, .form-select {
            background-color: #f8f9fc;
            border-left: none;
            padding: 12px;
            font-size: 0.95rem;
        }

        .form-control:focus, .form-select:focus {
            background-color: #fff;
            box-shadow: none;
            border-color: #dee2e6;
        }

        .btn-login {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 115, 223, 0.4);
            color: white;
        }

        .register-link {
            text-decoration: none;
            color: #4e73df;
            font-weight: 600;
        }

        /* Responsive Tweaks */
        @media (max-width: 992px) {
            .visual-section {
                display: none;
            }
            .form-section {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container-fluid p-0">
        <div class="row g-0 split-screen">
            <!-- Left Side -->
            <div class="col-lg-6 visual-section">
                <div class="mb-4">
                    <i class="fa-solid fa-graduation-cap fa-4x text-white"></i>
                </div>
                <h1>GradTrack</h1>
                <p>The most streamlined way for students and faculty to manage Letters of Recommendation. Fast, secure, and professional.</p>
            </div>

            <!-- Right Side -->
            <div class="col-lg-6 form-section">
                <div class="form-card">
                    <div class="text-center mb-4 d-lg-none">
                        <h2 style="color: #4e73df;">GradTrack</h2>
                    </div>
                    <h2>Welcome Back</h2>
                    <p class="text-muted mb-4">Please enter your details to sign in.</p>

                    <form>
                        <!-- Role Selection -->
                        <div class="mb-3">
                            <label class="form-label fw-medium small">Login As</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-user-shield"></i></span>
                                <select class="form-select" required>
                                    <option value="" selected disabled>Select Role</option>
                                    <option value="student">Student</option>
                                    <option value="faculty">Faculty</option>
                                    <option value="coordinator">Coordinator</option>
                                </select>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-medium small">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                                <input type="email" class="form-control" placeholder="name@university.edu" required>
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label class="form-label fw-medium small">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-login w-100 mb-3">Sign In</button>

                        <div class="text-center">
                            <span class="text-muted small">Don't have an account?</span>
                            <a href="register.html" class="register-link small"> Register here</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
