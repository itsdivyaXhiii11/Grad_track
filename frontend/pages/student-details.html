<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Details — LOR Portal</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>

<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-mortarboard-fill"></i></div>
      <div class="logo-text">Updation</div>
    </div>

    <h2>Student Details</h2>
    <p class="auth-sub">Fill in your academic details to continue</p>

    <form id="studentForm" novalidate>

      <!-- Batch -->
      <div class="mb-3">
        <label for="batch" class="form-label">Batch</label>

        <select class="form-select" id="lorName" required>
          <option value="" disabled selected>Select batch</option>
        </select>

        <div class="invalid-feedback">Please select batch.</div>
      </div>
    
      <!-- Branch -->
      <div class="mb-3">
        <label class="form-label">Branch</label>
        <select class="form-select" id="branch" required>
          <option value="" disabled selected>Select your branch</option>
          <option value="CSE">CSE</option>
          <option value="ISE">ISE</option>
          <option value="ECE">ECE</option>
          <option value="AIML">AIML</option>
           <option value="AIDS">AIDS</option>
            <option value="EEE">EEE</option>
        </select>
        <div class="invalid-feedback">Please select branch.</div>
      </div>

      <!--Name-->
      <div class="col-sm-6">
        <label for="lorName" class="form-label">
          Full Name <span class="text-danger">*</span>
        </label>

        <select class="form-select" id="batch" required>
          <option value="" disabled selected>Select your Name</option>
        </select>

        <div class="invalid-feedback">Full name is required.</div>
      </div>
                  
      <!--USN-->
      <div class="col-sm-6">
        <label for="lorUSN" class="form-label">USN <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="lorUSN" readonly />
                    
        <div class="invalid-feedback">Enter a valid USN (e.g. CS21B1001).</div>
      </div>

      <!-- Option -->
      <div class="mb-3">
        <label class="form-label">Current Status</label>

        <input list="statusOptions" class="form-control"
            id="option" placeholder="Select or type your status" required>

        <datalist id="statusOptions">
          <option value="Working">
          <option value="Higher Studies">
          <option value="None">
          <option value="Others">
        </datalist>

        <div class="invalid-feedback">Please select an option.</div>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2">
        <i class="bi bi-arrow-right-circle me-1"></i>Submit
      </button>

    </form>

  </div>
</div>

<script src="../js/student-details.js"></script>
<!-- your other scripts -->
<script src="../js/api.js"></script>
<script src="../js/student-dashboard.js"></script>



  


</body>
</html>
</body>
</html>
