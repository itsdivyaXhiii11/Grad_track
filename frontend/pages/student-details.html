<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Details — LOR Portal</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>

<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-mortarboard-fill"></i></div>
      <div class="logo-text">Updation</div>
    </div>

    <h2>Student Details</h2>
    <p class="auth-sub">Fill in your academic details to continue</p>

    <form id="studentForm" novalidate>

      <!-- Option -->
      <div class="mb-3">
        <label class="form-label">Current Status</label>

        <input list="statusOptions" class="form-control"
            id="option" placeholder="Select or type your status" required>

        <datalist id="statusOptions">
          <option value="Working">
          <option value="Higher Studies">
          <option value="None">
          <option value="Others">
        </datalist>

        <div class="invalid-feedback">Please select an option.</div>
      </div>
      <!--company-->
      <div class="mb-3">
        <label class="form-label">company/university name</label>
        <input type="text" id="info" class="form-control" required placeholder="Enter company/university name">
      </div>

      <!-- Country Dropdown -->
      <div class="mb-3">
        <label class="form-label">Country</label>
        <select id="country" class="form-control" required onchange="handleCountryChange()">
          <option value="">Select Country</option>
          <option value="India">India</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <!-- Input field (hidden by default) -->
      <div class="mb-3" id="otherCountryDiv" style="display: none;">
        <label class="form-label">Enter Country</label>
        <input type="text" id="otherCountry" class="form-control" placeholder="Enter your country">
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2">
        <i class="bi bi-arrow-right-circle me-1"></i>Submit
      </button>

    </form>

  </div>
</div>

<script src="../js/student-details.js"></script>
<!-- your other scripts -->
<script src="../js/api.js"></script>
<script src="../js/student-dashboard.js"></script>
<script>
  function handleCountryChange() {
    const country = document.getElementById("country").value;
    const otherDiv = document.getElementById("otherCountryDiv");

    if (country === "Other") {
      otherDiv.style.display = "block";
      document.getElementById("otherCountry").required = true;
    } else {
      otherDiv.style.display = "none";
      document.getElementById("otherCountry").required = false;
    }
  }
</script>


  


</body>
</html>
</body>
</html>
