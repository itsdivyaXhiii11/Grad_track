<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request LOR — LOR Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="sidebar-placeholder"></div>

  <div class="main-content">
    <div id="navbar-placeholder"></div>

    <div class="page-body">
      <div class="page-header">
        <h1>Request a Letter of Recommendation</h1>
        <p>Fill in the details below. Your faculty will be notified immediately.</p>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-8">

          <div class="card">
            <div class="card-header">
              <i class="bi bi-file-earmark-plus me-2 text-primary-color"></i>
              New LOR Request
            </div>
            <div class="card-body">

              <div id="requestAlert" class="alert d-none mb-3"></div>

              <form id="lorRequestForm" novalidate>

               


                <!-- Request Details -->
                <div class="form-section-title">Request Details</div>

                <div class="row g-3">
                  <!--faculty1-->
                  <div class="col-sm-6">
                    <label for="lorFaculty1" class="form-label">Faculty 1/ Recommender <span class="text-danger">*</span></label>
                    <select class="form-select" id="lorFaculty1" required>
                      <option value="" disabled selected>Loading faculty…</option>
                    </select>
                    <div class="invalid-feedback">Please select a faculty member.</div>
                  </div>
                  <!--faculty2-->
                  <div class="col-sm-6">
                    <label for="lorFaculty2" class="form-label">Faculty 2/ Recommender <span class="text-danger">*</span></label>
                    <select class="form-select" id="lorFaculty2" required>
                      <option value="" disabled selected>Loading faculty…</option>
                    </select>
                    <div class="invalid-feedback">Please select a faculty member.</div>
                  </div>

                    <!-- File Upload -->
                  <div class="mb-3">
                    <label for="file" class="form-label-1">Upload LOR (PDF, DOC, DOCX only)</label>
                    <input type="file" id="file1" class="form-control-1" accept=".pdf,.doc,.docx" required>
                  </div>

                  <!--university name-->
                  <div class="mb-3">
                    <label for="university" class="form-label">University Name</label>
                    <input type="text" id="university" class="form-control" required placeholder="Enter university name">
                  </div>

                  <!--country-->
                  
                  <div class="mb-3">
                    <label for="country" class="form-label">Country</label>
                    <input type="text" id="country" class="form-control" required placeholder="Enter country name">
                  </div>

                  <!-- Course -->
                  <div class="mb-3">
                    <label for="course" class="form-label">Course</label>
                    <input type="text" id="course" class="form-control" required placeholder="Enter course name">
                  </div>

                  <!-- Timeline -->
                  <div class="mb-3">
                    <label for="timeline" class="form-label">Timeline</label>
                    <select id="timeline" class="form-select" required>
                      <option value="">Select Timeline</option>
                      <option value="15 days">15 days</option>
                      <option value="1 month">1 month</option>
                      <option value="2 months">2 months</option>
                      <option value="3 months">3 months</option>
                      <option value="6 months">6 months</option>
                    </select>
                  </div>

                  <!-- File Upload 2-->
                  <div class="mb-3">
                    <label for="file" class="form-label-2">Upload proof(eg.ID card or Admission letter) (PDF, DOC, DOCX only)</label>
                    <input type="file" id="file2" class="form-control-2" accept=".pdf,.doc,.docx" required>
                  </div>
                
                 

                  

                <!-- Conditional: Abroad Fields -->
                 <!--university-->
                <div id="abroadSection" class="d-none">
                  <div class="form-section-title">Abroad Application Details</div>
                  <div class="row g-3">
                    <div class="col-sm-6">
                      <label for="lorUniversity" class="form-label">Target University <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="lorUniversity"
                             placeholder="e.g. TU Berlin" />
                    </div>
                    <!--country-->
                    <div class="col-sm-6">
                      <label for="lorCountry" class="form-label">Country</label>
                      <input type="text" class="form-control" id="lorCountry" placeholder="e.g. Germany" />
                    </div>
                    <!--course-->
                    <div class="col-sm-6">
                      <label for="lorProgram" class="form-label">Program Name</label>
                      <input type="text" class="form-control" id="lorProgram" placeholder="e.g. MSc Computer Science" />
                    </div>
                    <!--timeline-->
                    <div class="col-sm-6">
                      <label for="lorDeadline" class="form-label">Application Deadline</label>
                      <input type="date" class="form-control" id="lorDeadline" />
                    </div>
                  </div>
                </div>

                <!-- Additional Info -->
                <div class="form-section-title">Additional</div>
                <div class="col-sm-6">
                  <label for="lorAchievements" class="form-label">Key Achievements / Projects (optional)</label>
                  <textarea class="form-control" id="lorAchievements" rows="2"
                            placeholder="Mention any relevant projects, papers, or achievements…"></textarea>
                </div>

                <div class="d-flex gap-2 pt-2">
                  <button type="submit" class="btn btn-primary" id="lorSubmitBtn">
                    <span id="lorBtnText"><i class="bi bi-send me-1"></i>Submit Request</span>
                    <span id="lorBtnSpinner" class="d-none">
                      <span class="spinner-border spinner-border-sm me-1"></span>Submitting…
                    </span>
                  </button>
                  <a href="student-dashboard.html" class="btn btn-outline-secondary">
                    <i class="bi bi-x me-1"></i>Cancel
                  </a>
                </div>

              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="footer-placeholder"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/student-dashboard.js"></script>
<script src="../js/lor-request.js"></script>


</body>
</html>
