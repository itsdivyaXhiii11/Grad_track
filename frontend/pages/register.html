<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — LOR Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="auth-wrapper" style="padding: 40px 24px;">
  <div class="auth-card" style="max-width:480px;">

    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-mortarboard-fill"></i></div>
      <div class="logo-text">LOR Portal</div>
    </div>

    <h2>Create account</h2>
    <p class="auth-sub">Join the LOR &amp; Higher Studies Portal</p>

    <div id="registerAlert" class="alert d-none mb-3" role="alert"></div>

    <form id="registerForm" novalidate>

      <div class="row g-3">
        <div class="col-12">
          <label for="regName" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="regName"
                 placeholder="Enter your full name" required minlength="3" />
          <div class="invalid-feedback">Please enter your full name (min 3 chars).</div>
        </div>

        <div class="col-12">
          <label for="regEmail" class="form-label">Email Address</label>
          <input 
            type="email" 
            class="form-control" 
            id="regEmail"
            placeholder="Enter your email address" 
            required
            pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$"
          />
          <div class="invalid-feedback">Enter a valid email address.</div>
        </div>

        <div class="col-sm-6">
          <label for="regPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="regPassword"
                 placeholder="Min 8 characters" required minlength="8" />
          <div class="invalid-feedback">Minimum 8 characters required.</div>
        </div>

        <div class="col-sm-6">
          <label for="regConfirmPassword" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="regConfirmPassword"
                 placeholder="Re-enter password" required />
          <div class="invalid-feedback" id="confirmPwdFeedback">Passwords do not match.</div>
        </div>

        <div class="col-sm-6">
          <label for="regRole" class="form-label">Role</label>
          <select class="form-select" id="regRole" required>
            <option value="" disabled selected>Select role</option>
            <option value="student">Student</option>
            <option value="faculty">Faculty</option>
            <option value="coordinator">Coordinator</option>
          </select>
          <div class="invalid-feedback">Please select a role.</div>
        </div>

        <div class="col-sm-6" id="usnGroup">
          <label for="regUSN" class="form-label">USN / Employee ID</label>
          <input type="text" class="form-control" id="regUSN"
                 placeholder="4GWYYBR###" />
        </div>

        <div class="col-sm-6" id="branchGroup">
          <label for="regBranch" class="form-label">Branch / Department</label>
          <select class="form-select" id="regBranch">
            <option value="">Select branch</option>
            <option value="CSE">Computer Science (CSE)</option>
            <option value="ISE">Information Science (ISE)</option>
            <option value="ECE">Electronics (ECE)</option>
            <option value="AIML">AI/ML (CSE)</option>
            <option value="AIDS">AI/DS (CSE)</option>
             <option value="EEE">ELECTRONICS (EEE)</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-4" id="registerBtn">
        <span id="regBtnText"><i class="bi bi-person-plus me-1"></i>Create Account</span>
        <span id="regBtnSpinner" class="d-none">
          <span class="spinner-border spinner-border-sm me-1"></span>Creating…
        </span>
      </button>
    </form>

    <div class="auth-divider mt-3"><span>Already registered?</span></div>
    <a href="login.html" class="btn btn-outline-primary w-100">
      <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
    </a>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/register.js"></script>
</body>
</html>
