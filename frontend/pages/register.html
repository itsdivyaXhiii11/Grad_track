<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | GradTrack</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --secondary-gradient: linear-gradient(135deg, #1cc88a 0%, #13855c 100%);
            --primary-gradient: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fc;
            margin: 0;
        }

        .split-screen {
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
        }

        .visual-section {
            background: var(--secondary-gradient);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .visual-section h1 {
            font-weight: 700;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .form-section {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            padding: 40px 0;
        }

        .form-card {
            width: 100%;
            max-width: 500px;
            padding: 20px 40px;
        }

        .form-card h2 {
            font-weight: 700;
            color: #333;
        }

        .input-group-text {
            background-color: #f8f9fc;
            border-right: none;
            color: #1cc88a;
        }

        .form-control, .form-select {
            background-color: #f8f9fc;
            border-left: none;
            padding: 10px;
        }

        .btn-register {
            background: var(--secondary-gradient);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(28, 200, 138, 0.4);
            color: white;
        }

        .login-link {
            text-decoration: none;
            color: #1cc88a;
            font-weight: 600;
        }

        @media (max-width: 992px) {
            .visual-section {
                display: none;
            }
            .form-section {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container-fluid p-0">
        <div class="row g-0 split-screen">
            <!-- Left Side -->
            <div class="col-lg-6 visual-section">
                <div class="mb-4">
                    <i class="fa-solid fa-user-plus fa-4x text-white"></i>
                </div>
                <h1>Join GradTrack</h1>
                <p>Create an account today and start managing your recommendation letters with ease.</p>
            </div>

            <!-- Right Side -->
            <div class="col-lg-6 form-section">
                <div class="form-card">
                    <h2>Create Account</h2>
                    <p class="text-muted mb-4">Join our community of students and faculty.</p>

                    <form>
                        <!-- Name -->
                        <div class="mb-3">
                            <label class="form-label fw-medium small">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                                <input type="text" class="form-control" placeholder="John Doe" required>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-medium small">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                                <input type="email" class="form-control" placeholder="john@university.edu" required>
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label fw-medium small">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" class="form-control" placeholder="Create a strong password" required>
                            </div>
                        </div>

                        <div class="row">
                            <!-- Role Selection -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium small">I am a...</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-briefcase"></i></span>
                                    <select class="form-select" required>
                                        <option value="" selected disabled>Role</option>
                                        <option value="student">Student</option>
                                        <option value="faculty">Faculty</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Department -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium small">Department</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-building"></i></span>
                                    <input type="text" class="form-control" placeholder="e.g. CS" required>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-register w-100 mb-3">Create Account</button>

                        <div class="text-center">
                            <span class="text-muted small">Already have an account?</span>
                            <a href="login.html" class="login-link small"> Sign In</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
